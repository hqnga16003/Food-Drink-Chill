name: Android CI Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create Firebase config
        run: |
          echo "${{ secrets.FIREBASE_CONFIG_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Decode debug keystore
        run: |
          echo "${{ secrets.KEYSTORE_DEBUG_BASE64 }}" | base64 --decode > app/debug.keystore

      - name: Create keystore properties
        run: |
          echo "${{ secrets.KEYSTORE_PROPERTIES_BASE64 }}" | base64 --decode > keystore.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant permission
        run: chmod +x gradlew

      # 🔵 Build Debug
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 📦 Upload Debug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
